<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Racing Attack</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #222;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #333;
        }
        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        .hide {
            display: none !important;
        }
        h1 {
            font-size: 3rem;
            color: #ff3333;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,51,51,0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #aaa;
            text-align: center;
            padding: 0 20px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff3333 0%, #990000 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255,51,51,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(255,51,51,0.4);
        }
        /* Mobile Touch Controls */
        #touchControls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25%;
            z-index: 5;
            display: none;
            grid-template-columns: 1fr 1fr;
        }
        .steer-zone {
            height: 100%;
            opacity: 0.1;
        }
        #fireBtn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: rgba(255, 51, 51, 0.7);
            border: 3px solid #fff;
            border-radius: 50%;
            z-index: 6;
            display: none;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 0 1px 2px #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #fireBtn:active {
            background: rgba(255, 51, 51, 0.9);
            transform: scale(0.9);
        }
        /* Show mobile controls only on touch devices */
        @media (pointer: coarse) {
            #touchControls, #fireBtn {
                display: grid;
            }
            #fireBtn { display: flex; }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="startScreen" class="overlay">
        <h1>Racing Attack</h1>
        <p>Destroy enemy cars and survive the highway. Don't crash!</p>
        <button class="btn" onclick="startGame()">Race</button>
    </div>

    <div id="gameOverScreen" class="overlay hide">
        <h1 style="color: #ff3333;">Wrecked!</h1>
        <p id="finalScore">Score: 0</p>
        <button class="btn" onclick="startGame()">Retry</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="touchControls">
        <div id="leftZone" class="steer-zone"></div>
        <div id="rightZone" class="steer-zone"></div>
    </div>
    <div id="fireBtn">FIRE</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI Elements
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreText = document.getElementById('finalScore');
    const fireBtn = document.getElementById('fireBtn');

    // Game Constants & State
    let gameActive = false;
    let score = 0;
    let speedModifier = 1;
    let trackOffset = 0;

    // Entities
    let player;
    let enemies = [];
    let bullets = [];
    let particles = [];

    // Controls State
    const keys = { ArrowLeft: false, ArrowRight: false, KeyA: false, KeyD: false, Space: false };
    let touchLeft = false;
    let touchRight = false;
    let lastShotTime = 0;
    const shotCooldown = 250; // ms

    // Handle Resize to ensure crisp scaling on mobile high-DPI screens
    function resizeCanvas() {
        const container = document.getElementById('gameContainer');
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Player Object Blueprint
    class Player {
        constructor() {
            this.width = 40;
            this.height = 70;
            this.x = canvas.width / 2 - this.width / 2;
            this.y = canvas.height - this.height - 120; // Room for mobile buttons
            this.speed = 6;
            this.color = '#00ffcc';
        }

        update() {
            // Movement Logic
            if (keys.ArrowLeft || keys.KeyA || touchLeft) {
                this.x -= this.speed;
            }
            if (keys.ArrowRight || keys.KeyD || touchRight) {
                this.x += this.speed;
            }

            // Road Boundary Collisions (Keep within asphalt)
            const roadLeftBound = canvas.width * 0.15;
            const roadRightBound = canvas.width * 0.85 - this.width;
            if (this.x < roadLeftBound) this.x = roadLeftBound;
            if (this.x > roadRightBound) this.x = roadRightBound;

            // Handle Continuous Keyboard Shooting
            if (keys.Space) {
                shootBullet();
            }
        }

        draw() {
            // Draw sleek racing car chassis
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y + 10, this.width, this.height - 20);
            // Cockpit
            ctx.fillStyle = '#fff';
            ctx.fillRect(this.x + 10, this.y + 25, this.width - 20, 15);
            // Wheels
            ctx.fillStyle = '#111';
            ctx.fillRect(this.x - 4, this.y + 12, 4, 14); // Front Left
            ctx.fillRect(this.x + this.width, this.y + 12, 4, 14); // Front Right
            ctx.fillRect(this.x - 4, this.y + 44, 4, 14); // Rear Left
            ctx.fillRect(this.x + this.width, this.y + 44, 4, 14); // Rear Right
            // Spoiler
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(this.x - 2, this.y + this.height - 10, this.width + 4, 6);
        }
    }

    // Enemy Car Blueprint
    class Enemy {
        constructor() {
            this.width = 40;
            this.height = 70;
            const roadLeft = canvas.width * 0.15;
            const roadRight = canvas.width * 0.85 - this.width;
            this.x = Math.random() * (roadRight - roadLeft) + roadLeft;
            this.y = -this.height;
            this.baseSpeed = Math.random() * 2 + 2;
            this.speed = this.baseSpeed;
            const colors = ['#ff3333', '#ff9900', '#ffff00', '#e60067'];
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update() {
            // Move relative to scrolling environment
            this.y += this.speed * speedModifier;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y + 10, this.width, this.height - 20);
            ctx.fillStyle = '#222'; // Tinted windshield
            ctx.fillRect(this.x + 8, this.y + 15, this.width - 16, 12);
            // Wheels
            ctx.fillStyle = '#000';
            ctx.fillRect(this.x - 4, this.y + 12, 4, 14);
            ctx.fillRect(this.x + this.width, this.y + 12, 4, 14);
            ctx.fillRect(this.x - 4, this.y + 44, 4, 14);
            ctx.fillRect(this.x + this.width, this.y + 44, 4, 14);
        }
    }

    // Bullet Blueprint
    class Bullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 4;
            this.height = 15;
            this.speed = 12;
        }
        update() { this.y -= this.speed; }
        draw() {
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }

    // Particle Blueprint for Explosions
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.radius = Math.random() * 3 + 1;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.alpha = 1;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= 0.03;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Gun firing trigger
    function shootBullet() {
        const now = Date.now();
        if (now - lastShotTime > shotCooldown) {
            bullets.push(new Bullet(player.x + player.width / 2 - 2, player.y));
            lastShotTime = now;
        }
    }

    // Create explosions
    function createExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    // AABB Collision detection
    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    // Draw scrolling background road environment
    function drawEnvironment() {
        // Track Scrolling speed
        trackOffset += 5 * speedModifier;
        if (trackOffset >= 40) trackOffset = 0;

        // Background terrain (Grass shoulders)
        ctx.fillStyle = '#1e5917';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Asphalt Track
        const roadX = canvas.width * 0.15;
        const roadWidth = canvas.width * 0.7;
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(roadX, 0, roadWidth, canvas.height);

        // Shoulders (Red/White curbs)
        ctx.fillStyle = '#fff';
        ctx.fillRect(roadX - 8, 0, 8, canvas.height);
        ctx.fillRect(roadX + roadWidth, 0, 8, canvas.height);

        ctx.fillStyle = '#cc0000';
        for (let y = -40 + trackOffset; y < canvas.height; y += 40) {
            ctx.fillRect(roadX - 8, y, 8, 20);
            ctx.fillRect(roadX + roadWidth, y, 8, 20);
        }

        // Center dash lines
        ctx.fillStyle = '#ffffff';
        for (let y = -60 + trackOffset; y < canvas.height; y += 60) {
            ctx.fillRect(canvas.width / 2 - 2, y, 4, 30);
        }
    }

    // Spawning logic (Gradually gets harder)
    let spawnTimer = 0;
    function handleSpawning() {
        spawnTimer++;
        let spawnInterval = Math.max(30, 90 - Math.floor(score / 5)); 
        if (spawnTimer >= spawnInterval) {
            enemies.push(new Enemy());
            spawnTimer = 0;
        }
    }

    // Main Game Loop
    function update() {
        if (!gameActive) return;

        // 1. Calculations & Logic Updates
        speedModifier = 1 + (score * 0.03); // Speed up track dynamically
        player.update();

        // Update bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].update();
            if (bullets[i].y < -20) bullets.splice(i, 1);
        }

        // Update enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update();

            // Off screen management
            if (enemies[i].y > canvas.height + 50) {
                enemies.splice(i, 1);
                score++; // Survived a car pass
                continue;
            }

            // Bullet vs Enemy Collision
            for (let j = bullets.length - 1; j >= 0; j--) {
                if (checkCollision(bullets[j], enemies[i])) {
                    createExplosion(enemies[i].x + enemies[i].width/2, enemies[i].y + enemies[i].height/2, enemies[i].color);
                    enemies.splice(i, 1);
                    bullets.splice(j, 1);
                    score += 2; // Extra points for combat kills
                    break;
                }
            }

            // Player vs Enemy Collision (Game Over execution)
            if (enemies[i] && checkCollision(player, enemies[i])) {
                createExplosion(player.x + player.width/2, player.y + player.height/2, '#00ffcc');
                endGame();
            }
        }

        // Update VFX Explosion particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].alpha <= 0) particles.splice(i, 1);
        }

        handleSpawning();

        // 2. Rendering operations
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawEnvironment();

        bullets.forEach(b => b.draw());
        enemies.forEach(e => e.draw());
        player.draw();
        particles.forEach(p => p.draw());

        // UI Scoreboard
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px sans-serif';
        ctx.fillText(`SCORE: ${score}`, 25, 35);

        requestAnimationFrame(update);
    }

    // Engine Flow Controls
    function startGame() {
        // Reset properties
        score = 0;
        enemies = [];
        bullets = [];
        particles = [];
        player = new Player();
        
        startScreen.classList.add('hide');
        gameOverScreen.classList.add('hide');
        gameActive = true;
        
        requestAnimationFrame(update);
    }

    function endGame() {
        gameActive = false;
        finalScoreText.innerText = `Score: ${score}`;
        gameOverScreen.classList.remove('hide');
    }

    // Desktop Input Listeners
    window.addEventListener('keydown', (e) => {
        if (e.code in keys) keys[e.code] = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.code in keys) keys[e.code] = false;
    });

    // Mobile Input Handlers (Steering Zones & Weapon Buttons)
    document.getElementById('leftZone').addEventListener('touchstart', (e) => { e.preventDefault(); touchLeft = true; });
    document.getElementById('leftZone').addEventListener('touchend', () => touchLeft = false);
    
    document.getElementById('rightZone').addEventListener('touchstart', (e) => { e.preventDefault(); touchRight = true; });
    document.getElementById('rightZone').addEventListener('touchend', () => touchRight = false);

    fireBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(gameActive) shootBullet();
    });
</script>

</body>
</html>
