<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Racing Attack</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --primary-color: #ff3e3e;
            --secondary-color: #ffd700;
            --ui-bg: rgba(0, 0, 0, 0.7);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: #2b2b2b;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16;
        }

        /* UI Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: #fff;
            text-align: center;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(4px);
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 3rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ccc;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #000;
            background: var(--secondary-color);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            text-transform: uppercase;
        }

        /* Fixed Mobile Touch Overlay Controls */
        #touch-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px 25px 25px;
            pointer-events: none;
            z-index: 5;
        }

        .control-group {
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }

        .ctrl-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--ui-bg);
            border: 3px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 2rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
            cursor: pointer;
            /* Critical for mobile touch responsiveness */
            touch-action: none; 
            -webkit- Pilgrim-tap-highlight-color: transparent;
        }

        #btn-shoot {
            width: 90px;
            height: 90px;
            background: rgba(255, 62, 62, 0.4);
            border-color: rgba(255, 62, 62, 0.8);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="screen">
        <h1>Racing Attack</h1>
        <p>Destroy enemies. Collect cash. Survive.</p>
        <button class="btn" id="start-btn">Race</button>
    </div>

    <div id="gameover-screen" class="screen hidden">
        <h1>Wrecked</h1>
        <p id="final-score">Score: 0</p>
        <p id="final-cash">Earnings: 0</p>
        <button class="btn" id="restart-btn">Drive Again</button>
    </div>

    <div id="touch-controls">
        <div class="control-group">
            <div class="ctrl-btn" id="btn-left">←</div>
            <div class="ctrl-btn" id="btn-right">→</div>
        </div>
        <div class="control-group">
            <div class="ctrl-btn" id="btn-shoot">🔥</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const GAME_WIDTH = 360;
    const GAME_HEIGHT = 640;
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;

    const STATES = { START: 0, PLAYING: 1, GAMEOVER: 2 };
    let gameState = STATES.START;

    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'shoot') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'explosion') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        } catch(e) {}
    }

    const keys = { Left: false, Right: false };
    
    // Desktop Keyboard Listeners
    window.addEventListener('keydown', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.Left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.Right = true;
        if (e.code === 'Space' && gameState === STATES.PLAYING) player.shoot();
    });

    window.addEventListener('keyup', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.Left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.Right = false;
    });

    // Bulletproof Universal Touch and Click Handlers
    function setupButton(id, onPress, onRelease = null) {
        const btn = document.getElementById(id);
        
        // Touch devices
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            onPress();
        }, { passive: false });
        
        if (onRelease) {
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                onRelease();
            }, { passive: false });
        }

        // Mouse Fallbacks for testing
        btn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            onPress();
        });
        if (onRelease) {
            btn.addEventListener('mouseup', onRelease);
            btn.addEventListener('mouseleave', onRelease);
        }
    }

    setupButton('btn-left', () => keys.Left = true, () => keys.Left = false);
    setupButton('btn-right', () => keys.Right = true, () => keys.Right = false);
    setupButton('btn-shoot', () => { if (gameState === STATES.PLAYING) player.shoot(); });

    let player;
    let enemies = [];
    let bullets = [];
    let coins = [];
    let particles = [];
    let roadY = 0;
    let score = 0;
    let cash = 0;
    let speedMPH = 70;
    let spawnTimer = 0;
    let ambientCoinTimer = 0;
    let gameTicks = 0;
    let screenShake = 0;

    class Player {
        constructor() {
            this.width = 40;
            this.height = 70;
            this.x = GAME_WIDTH / 2 - this.width / 2;
            this.y = GAME_HEIGHT - 180;
            this.speed = 6;
            this.health = 100;
            this.shootCooldown = 0;
        }

        update() {
            if (keys.Left && this.x > 50) this.x -= this.speed;
            if (keys.Right && this.x < GAME_WIDTH - 50 - this.width) this.x += this.speed;
            if (this.shootCooldown > 0) this.shootCooldown--;
        }

        shoot() {
            if (this.shootCooldown === 0) {
                bullets.push(new Bullet(this.x + this.width / 2 - 3, this.y));
                this.shootCooldown = 10; 
                playSound('shoot');
            }
        }

        draw() {
            // Wheels
            ctx.fillStyle = '#111';
            ctx.fillRect(this.x - 4, this.y + 10, 6, 14);
            ctx.fillRect(this.x + this.width - 2, this.y + 10, 6, 14);
            ctx.fillRect(this.x - 4, this.y + 48, 6, 14);
            ctx.fillRect(this.x + this.width - 2, this.y + 48, 6, 14);

            // Car Body
            ctx.fillStyle = '#ff2222';
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.width, this.height, 8);
            ctx.fill();

            // Stripes
            ctx.fillStyle = '#fff';
            ctx.fillRect(this.x + 12, this.y, 4, this.height);
            ctx.fillRect(this.x + 24, this.y, 4, this.height);

            // Windshield
            ctx.fillStyle = '#55ccff';
            ctx.beginPath();
            ctx.roundRect(this.x + 8, this.y + 22, this.width - 16, 18, 4);
            ctx.fill();
        }
    }

    class Enemy {
        constructor() {
            this.width = 42;
            this.height = 72;
            this.x = Math.random() * (GAME_WIDTH - 100 - this.width) + 50;
            this.y = -this.height;
            this.speed = Math.random() * 2 + 2.5;
            this.health = Math.random() > 0.7 ? 2 : 1; 
            this.type = this.health > 1 ? 'armored' : 'standard';
        }

        update() {
            this.y += this.speed;
        }

        draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(this.x - 4, this.y + 10, 6, 14);
            ctx.fillRect(this.x + this.width - 2, this.y + 10, 6, 14);

            ctx.fillStyle = this.type === 'armored' ? '#555555' : '#00aa55';
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.width, this.height, 6);
            ctx.fill();

            ctx.fillStyle = '#333';
            ctx.fillRect(this.x + 8, this.y + 25, this.width - 16, 15);
        }
    }

    class Bullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 6;
            this.height = 16;
            this.speed = 14;
        }

        update() { this.y -= this.speed; }
        draw() {
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }

    class Coin {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 20;  // Explicit dimensional box for perfect collisions
            this.height = 20;
            this.pulse = 0;
        }

        update() {
            this.y += 3.5; 
            this.pulse += 0.1;
        }

        draw() {
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ffd700';
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(this.x + 10, this.y + 10, 9 + Math.sin(this.pulse) * 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.alpha = 1;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= 0.04;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 4, 4);
            ctx.restore();
        }
    }

    function createExplosion(x, y, color = '#ff5500') {
        playSound('explosion');
        screenShake = 8;
        for (let i = 0; i < 10; i++) particles.push(new Particle(x, y, color));
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    function initGame() {
        player = new Player();
        enemies = [];
        bullets = [];
        coins = [];
        particles = [];
        score = 0;
        cash = 0;
        speedMPH = 70;
        spawnTimer = 0;
        ambientCoinTimer = 0;
        gameTicks = 0;
    }

    function update() {
        if (gameState !== STATES.PLAYING) return;

        gameTicks++;
        speedMPH = 70 + Math.floor(gameTicks / 150);

        roadY += speedMPH * 0.12;
        if (roadY >= 80) roadY = 0;

        player.update();

        // Projectiles
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].update();
            if (bullets[i].y < -20) bullets.splice(i, 1);
        }

        // Enemy Generator
        spawnTimer++;
        if (spawnTimer > Math.max(40, 80 - Math.floor(gameTicks / 250))) {
            enemies.push(new Enemy());
            spawnTimer = 0;
        }

        // Ambient Coin Generator (Spawns a free coin on the asphalt every 2.5 seconds)
        ambientCoinTimer++;
        if (ambientCoinTimer > 150) { 
            coins.push(new Coin(Math.random() * (GAME_WIDTH - 140) + 60, -30));
            ambientCoinTimer = 0;
        }

        // Processing Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update();

            if (enemies[i].y > GAME_HEIGHT) {
                enemies.splice(i, 1);
                score += 10;
                continue;
            }

            // Player Crash
            if (checkCollision(player, enemies[i])) {
                createExplosion(enemies[i].x + enemies[i].width/2, enemies[i].y + enemies[i].height/2);
                player.health -= enemies[i].type === 'armored' ? 34 : 20;
                enemies.splice(i, 1);

                if (player.health <= 0) {
                    gameState = STATES.GAMEOVER;
                    document.getElementById('final-score').innerText = `Score: ${score}`;
                    document.getElementById('final-cash').innerText = `Earnings: Coins ${cash}`;
                    document.getElementById('gameover-screen').classList.remove('hidden');
                }
                continue;
            }

            // Bullet hits Enemy
            for (let j = bullets.length - 1; j >= 0; j--) {
                if (checkCollision(bullets[j], enemies[i])) {
                    bullets.splice(j, 1);
                    enemies[i].health--;

                    if (enemies[i].health <= 0) {
                        createExplosion(enemies[i].x + enemies[i].width/2, enemies[i].y + enemies[i].height/2, '#ffd700');
                        // Enemies drop a valuable coin on death
                        coins.push(new Coin(enemies[i].x + enemies[i].width/2 - 10, enemies[i].y + enemies[i].height/2 - 10));
                        enemies.splice(i, 1);
                        score += 50;
                        break;
                    }
                }
            }
        }

        // Processing Coins
        for (let i = coins.length - 1; i >= 0; i--) {
            coins[i].update();
            
            // Generous collision box to make picking up coins effortless
            const dynamicCoinBox = {
                x: coins[i].x - 6,
                y: coins[i].y - 6,
                width: coins[i].width + 12,
                height: coins[i].height + 12
            };

            if (checkCollision(player, dynamicCoinBox)) {
                playSound('coin');
                cash += 5; 
                coins.splice(i, 1);
                continue;
            }

            if (coins[i].y > GAME_HEIGHT + 20) coins.splice(i, 1);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].alpha <= 0) particles.splice(i, 1);
        }

        if (screenShake > 0) screenShake *= 0.85;
    }

    function draw() {
        ctx.save();
        if (screenShake > 0.5) {
            ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
        }

        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // Track Graphic Layer
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(45, 0, GAME_WIDTH - 90, GAME_HEIGHT);

        ctx.fillStyle = '#228B22'; 
        ctx.fillRect(0, 0, 45, GAME_HEIGHT);
        ctx.fillRect(GAME_WIDTH - 45, 0, 45, GAME_HEIGHT);

        ctx.fillStyle = '#fff';
        ctx.fillRect(42, 0, 3, GAME_HEIGHT);
        ctx.fillRect(GAME_WIDTH - 45, 0, 3, GAME_HEIGHT);

        ctx.fillStyle = '#ffffff';
        for (let y = roadY - 80; y < GAME_HEIGHT; y += 80) {
            ctx.fillRect(GAME_WIDTH / 3, y, 4, 40);
            ctx.fillRect((GAME_WIDTH / 3) * 2, y, 4, 40);
        }

        coins.forEach(coin => coin.draw());
        enemies.forEach(enemy => enemy.draw());
        bullets.forEach(bullet => bullet.draw());
        if (gameState === STATES.PLAYING) player.draw();
        particles.forEach(p => p.draw());

        ctx.restore();

        // Overlay Text HUD Display
        if (gameState === STATES.PLAYING) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, GAME_WIDTH, 50);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 15px sans-serif';
            ctx.fillText(`Score: ${score}`, 15, 31);
            
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText(`Coins: ${cash}`, GAME_WIDTH - 85, 31);

            ctx.fillStyle = '#ccc';
            ctx.font = '11px sans-serif';
            ctx.fillText(`${speedMPH} mph`, GAME_WIDTH / 2 - 22, 42);

            ctx.fillStyle = '#444';
            ctx.fillRect(GAME_WIDTH / 2 - 50, 14, 100, 10);
            ctx.fillStyle = player.health > 30 ? '#00ff66' : '#ff3333';
            ctx.fillRect(GAME_WIDTH / 2 - 50, 14, player.health, 10);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // UI View Switches
    document.getElementById('start-btn').addEventListener('click', () => {
        initAudio();
        initGame();
        gameState = STATES.PLAYING;
        document.getElementById('start-screen').classList.add('hidden');
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
        initGame();
        gameState = STATES.PLAYING;
        document.getElementById('gameover-screen').classList.add('hidden');
    });

    loop();
</script>
</body>
</html>
